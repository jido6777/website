<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background -->
  <rect width="32" height="32" fill="#010204"/>

  <!-- Corner brackets -->
  <path d="M2 6 L2 2 L6 2" stroke="#FCE300" stroke-width="1.2" stroke-linecap="square"/>
  <path d="M26 2 L30 2 L30 6" stroke="#FCE300" stroke-width="1.2" stroke-linecap="square"/>
  <path d="M2 26 L2 30 L6 30" stroke="#FCE300" stroke-width="1.2" stroke-linecap="square"/>
  <path d="M30 26 L30 30 L26 30" stroke="#FCE300" stroke-width="1.2" stroke-linecap="square"/>

  <!-- Skull outline -->
  <path d="M16 5 C10 5 7 9 7 13.5 C7 17 8.5 19.5 11 21 L11 24 C11 24.6 11.4 25 12 25 L20 25 C20.6 25 21 24.6 21 24 L21 21 C23.5 19.5 25 17 25 13.5 C25 9 22 5 16 5 Z" stroke="#FCE300" stroke-width="1" fill="none"/>

  <!-- Jaw teeth lines -->
  <line x1="13" y1="25" x2="13" y2="27" stroke="#FCE300" stroke-width="0.8"/>
  <line x1="16" y1="25" x2="16" y2="27" stroke="#FCE300" stroke-width="0.8"/>
  <line x1="19" y1="25" x2="19" y2="27" stroke="#FCE300" stroke-width="0.8"/>

  <!-- Eye sockets - left -->
  <rect x="10" y="12" width="4.5" height="4" rx="0.5" fill="#FCE300" opacity="0.9"/>
  <!-- Eye inner glow dot -->
  <rect x="11.5" y="13.5" width="1.5" height="1" fill="#010204"/>

  <!-- Eye sockets - right -->
  <rect x="17.5" y="12" width="4.5" height="4" rx="0.5" fill="#FCE300" opacity="0.9"/>
  <rect x="19" y="13.5" width="1.5" height="1" fill="#010204"/>

  <!-- Nose cavity -->
  <path d="M15 18 L16 19.5 L17 18" stroke="#FCE300" stroke-width="0.8" fill="none"/>

  <!-- Circuit lines on skull -->
  <line x1="7" y1="13.5" x2="4" y2="13.5" stroke="#ff003c" stroke-width="0.6" opacity="0.8"/>
  <circle cx="3.5" cy="13.5" r="0.8" fill="#ff003c" opacity="0.8"/>
  <line x1="25" y1="13.5" x2="28" y2="13.5" stroke="#ff003c" stroke-width="0.6" opacity="0.8"/>
  <circle cx="28.5" cy="13.5" r="0.8" fill="#ff003c" opacity="0.8"/>

  <!-- Top circuit -->
  <line x1="16" y1="5" x2="16" y2="2.5" stroke="#00eeff" stroke-width="0.6" opacity="0.7"/>
  <circle cx="16" cy="2" r="0.8" fill="#00eeff" opacity="0.7"/>
</svg>
