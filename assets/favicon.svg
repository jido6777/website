<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&amp;display=swap');
    </style>
    <filter id="gc" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b1"/>
      <feGaussianBlur stdDeviation="6" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gm" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2" result="b1"/>
      <feMerge><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="12" fill="#050a0f"/>

  <!-- Border glow -->
  <rect width="100" height="100" rx="12" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.4"/>

  <!-- J letter with cyan glow -->
  <text
    x="52" y="76"
    text-anchor="middle"
    font-family="'Orbitron', monospace"
    font-size="72"
    font-weight="900"
    fill="#00f0ff"
    filter="url(#gc)"
  >J</text>

  <!-- Magenta accent dot bottom-right -->
  <circle cx="78" cy="80" r="5" fill="#ff2d78" filter="url(#gm)"/>
</svg>
