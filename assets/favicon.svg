<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&amp;display=swap');

      @keyframes glitch1 {
        0%, 85%, 100% { transform: translate(0); opacity: 0; }
        87% { transform: translate(-4px, 1px); opacity: 0.75; clip-path: polygon(0 20%, 100% 20%, 100% 45%, 0 45%); }
        89% { transform: translate(3px, -1px); opacity: 0.6; clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%); }
        91% { transform: translate(-2px, 2px); opacity: 0.8; clip-path: polygon(0 5%, 100% 5%, 100% 22%, 0 22%); }
        93% { opacity: 0; }
      }

      @keyframes glitch2 {
        0%, 85%, 100% { transform: translate(0); opacity: 0; }
        88% { transform: translate(4px, -2px); opacity: 0.65; clip-path: polygon(0 55%, 100% 55%, 100% 75%, 0 75%); }
        90% { transform: translate(-3px, 1px); opacity: 0.7; clip-path: polygon(0 30%, 100% 30%, 100% 48%, 0 48%); }
        92% { transform: translate(2px, -1px); opacity: 0.5; clip-path: polygon(0 80%, 100% 80%, 100% 95%, 0 95%); }
        94% { opacity: 0; }
      }

      @keyframes borderPulse {
        0%, 100% { opacity: 0.95; }
        50% { opacity: 0.6; }
      }

      .glitch-cyan { animation: glitch1 5s steps(1) infinite; }
      .glitch-mag  { animation: glitch2 5s steps(1) infinite; }
      .border-ring { animation: borderPulse 3s ease-in-out infinite; }
    </style>

    <clipPath id="cc">
      <circle cx="50" cy="50" r="48"/>
    </clipPath>
    <filter id="gc" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b1"/>
      <feGaussianBlur stdDeviation="6" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b1"/>
      <feGaussianBlur stdDeviation="8" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="50" cy="50" r="48" fill="#050a0f"/>

  <g clip-path="url(#cc)">
    <!-- Magenta glitch layer -->
    <text class="glitch-mag"
      x="52" y="76"
      text-anchor="middle"
      font-family="'Orbitron', monospace"
      font-size="72" font-weight="900"
      fill="#ff2d78"
    >J</text>

    <!-- Cyan glitch layer -->
    <text class="glitch-cyan"
      x="52" y="76"
      text-anchor="middle"
      font-family="'Orbitron', monospace"
      font-size="72" font-weight="900"
      fill="#00f0ff"
    >J</text>

    <!-- Main J -->
    <text
      x="52" y="76"
      text-anchor="middle"
      font-family="'Orbitron', monospace"
      font-size="72" font-weight="900"
      fill="#00f0ff"
      filter="url(#gc)"
    >J</text>
  </g>

  <!-- Neon border -->
  <circle class="border-ring" cx="50" cy="50" r="47" fill="none" stroke="#00f0ff" stroke-width="5" opacity="0.15" filter="url(#neon)"/>
  <circle class="border-ring" cx="50" cy="50" r="47" fill="none" stroke="#00f0ff" stroke-width="2.5" opacity="0.3" filter="url(#neon)"/>
  <circle class="border-ring" cx="50" cy="50" r="47" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.95"/>
</svg>
