<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ghost 1: cyan, offset top-left -->
  <text x="1" y="24" font-family="'Orbitron', 'Share Tech Mono', monospace" font-weight="900" font-size="14" letter-spacing="-1" opacity="0.28">
    <tspan fill="#00f0ff">J</tspan><tspan fill="#00f0ff">6</tspan><tspan fill="#00f0ff">7</tspan>
  </text>

  <!-- Ghost 2: magenta, offset bottom-right -->
  <text x="3" y="26" font-family="'Orbitron', 'Share Tech Mono', monospace" font-weight="900" font-size="14" letter-spacing="-1" opacity="0.28">
    <tspan fill="#ff2d78">J</tspan><tspan fill="#ff2d78">6</tspan><tspan fill="#ff2d78">7</tspan>
  </text>

  <!-- Main sharp layer -->
  <text x="2" y="25" font-family="'Orbitron', 'Share Tech Mono', monospace" font-weight="900" font-size="14" letter-spacing="-1" filter="url(#glow)">
    <tspan fill="#00f0ff">J</tspan><tspan fill="#ff2d78">6</tspan><tspan fill="#00f0ff">7</tspan>
  </text>

</svg>
