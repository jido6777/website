<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&amp;display=swap');
    </style>
    <clipPath id="circle-clip">
      <circle cx="50" cy="50" r="48"/>
    </clipPath>
    <filter id="gc" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b1"/>
      <feGaussianBlur stdDeviation="6" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gm" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2" result="b1"/>
      <feMerge><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neon-border" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur1"/>
      <feGaussianBlur stdDeviation="7" result="blur2"/>
      <feGaussianBlur stdDeviation="12" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background circle -->
  <circle cx="50" cy="50" r="48" fill="#050a0f"/>

  <!-- J letter and accent, clipped to circle -->
  <g clip-path="url(#circle-clip)">
    <text
      x="52" y="76"
      text-anchor="middle"
      font-family="'Orbitron', monospace"
      font-size="72"
      font-weight="900"
      fill="#00f0ff"
      filter="url(#gc)"
    >J</text>

  </g>

  <!-- Neon border glow -->
  <circle cx="50" cy="50" r="47" fill="none" stroke="#00f0ff" stroke-width="5" opacity="0.15" filter="url(#neon-border)"/>
  <circle cx="50" cy="50" r="47" fill="none" stroke="#00f0ff" stroke-width="2.5" opacity="0.3" filter="url(#neon-border)"/>
  <!-- Crisp ring on top -->
  <circle cx="50" cy="50" r="47" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.95"/>
</svg>
